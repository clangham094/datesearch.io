<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Date Search</title>
    <style>
        :root { --gold: #D4AF37; --dark-blue: #0A192F; --slate: #1d2d44; }
        body { font-family: sans-serif; background: var(--dark-blue); color: white; margin: 0; display: flex; height: 100vh; }
        nav { width: 200px; background: #071121; padding: 20px; border-right: 1px solid var(--gold); }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .status { background: var(--slate); padding: 20px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .profile { background: #112240; border-radius: 10px; height: 250px; position: relative; border: 1px solid #1e293b; overflow: hidden; }
        .blur { filter: blur(10px); width: 100%; height: 100%; object-fit: cover; }
        .lock-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
    </style>
</head>
<body>
    <nav>
        <h2 style="color:var(--gold)">D.S</h2>
        <p>Search</p><p>Messages</p><p>Account</p>
    </nav>
    <main>
        <div class="status">
            <h3>Honey Shot Status: <span style="color:var(--gold)">ACTIVE</span></h3>
            <p>Welcome to the Hive. You are browsing in Scout Mode.</p>
        </div>
        <div class="grid">
            <div class="profile"><div class="lock-overlay">🔒 Upgrade to View</div><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300" class="blur"></div>
            <div class="profile"><div class="lock-overlay">🔒 Upgrade to View</div><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300" class="blur"></div>
            <div class="profile"><div class="lock-overlay">🔒 Upgrade to View</div><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=300" class="blur"></div>
        </div>
    </main>
</body>
</html>
