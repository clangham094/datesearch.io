<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Date Search</title>
    <style>
        :root { --gold: #D4AF37; --dark-blue: #0A192F; --slate: #1d2d44; --red: #ef4444; }
        body { font-family: sans-serif; background: var(--dark-blue); color: white; margin: 0; display: flex; height: 100vh; }
        nav { width: 220px; background: #071121; padding: 30px 20px; border-right: 1px solid var(--gold); }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: var(--slate); padding: 20px; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .profile { background: #112240; border-radius: 15px; height: 280px; position: relative; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .blur { filter: blur(12px); width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .lock-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; text-align: center; }
        .guard-alert { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); color: var(--red); padding: 15px; border-radius: 10px; margin-top: 40px; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <h2 style="color:var(--gold)">D.S</h2>
        <p>Explore</p><p>Messages</p><p>Verified Files</p><p>Settings</p>
    </nav>
    <main>
        <div class="header-bar">
            <div>
                <small style="color:#94a3b8">Welcome back, Member</small>
                <div style="font-size:1.1rem; font-weight:bold">Status: <span style="color:var(--gold)">Honey Shot Active</span></div>
            </div>
            <div style="background:var(--gold); color:#000; padding:5px 15px; border-radius:20px; font-weight:bold; font-size:0.8rem;">SECURE</div>
        </div>
        <div class="grid">
            <div class="profile"><div class="lock-text">🔒 Solo Access Required</div><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300" class="blur"></div>
            <div class="profile"><div class="lock-text">🔒 Solo Access Required</div><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300" class="blur"></div>
            <div class="profile"><div class="lock-text">🔒 Solo Access Required</div><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=300" class="blur"></div>
        </div>
        <div class="guard-alert">
            🛡️ <strong>IRONCLAD GUARD:</strong> One-Strike Nudity Rule in effect. Device ID logging is active.
        </div>
    </main>
</body>
</html>
